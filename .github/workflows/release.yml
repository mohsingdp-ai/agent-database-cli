name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package: linux-x64
            os: linux
            cpu: x64
            binary: agent-database-cli
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            package: linux-arm64
            os: linux
            cpu: arm64
            binary: agent-database-cli
          - target: x86_64-apple-darwin
            runner: macos-14
            package: darwin-x64
            os: darwin
            cpu: x64
            binary: agent-database-cli
          - target: aarch64-apple-darwin
            runner: macos-14
            package: darwin-arm64
            os: darwin
            cpu: arm64
            binary: agent-database-cli
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            package: win32-x64
            os: win32
            cpu: x64
            binary: agent-database-cli.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build binary
        run: cargo build --release --bin agent-database-cli --target ${{ matrix.target }}

      - name: Stage binary package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="packages/${{ matrix.package }}"
          mkdir -p "$PKG_DIR/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$PKG_DIR/bin/${{ matrix.binary }}"
          chmod +x "$PKG_DIR/bin/${{ matrix.binary }}" || true
          sed \
            -e "s#__NAME__#@agent-database-cli/${{ matrix.package }}#g" \
            -e "s#__VERSION__#${VERSION}#g" \
            -e "s#__TARGET__#${{ matrix.target }}#g" \
            -e "s#__OS__#${{ matrix.os }}#g" \
            -e "s#__CPU__#${{ matrix.cpu }}#g" \
            npm/package-template.json > "$PKG_DIR/package.json"

      - name: Pack binary package
        shell: bash
        run: |
          cd "packages/${{ matrix.package }}"
          npm pack --pack-destination ../..

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.package }}
          path: "*.tgz"

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download binary packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          merge-multiple: true

      - name: Pack main npm package
        run: npm pack

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            ./*.tgz \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
