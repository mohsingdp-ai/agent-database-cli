name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            runner: macos-14
            ext: ""
          - target: aarch64-apple-darwin
            runner: macos-14
            ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build binary
        run: cargo build --release --bin agent-database-cli --target ${{ matrix.target }}

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          SRC="target/${{ matrix.target }}/release/agent-database-cli${{ matrix.ext }}"
          ASSET="agent-database-cli-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$ASSET"
          # postinstall.js downloads exactly this asset name from the release.
          echo "staged $ASSET"

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-database-cli-${{ matrix.target }}${{ matrix.ext }}
          fail_on_unmatched_files: true
