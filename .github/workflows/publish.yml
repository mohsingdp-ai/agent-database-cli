name: Publish npm

# Manual only. Distribution is via GitHub Releases (see release.yml); npm ships a
# single launcher package whose postinstall downloads the binary from the release.
# Publish the npm launcher package on demand (requires an NPM_TOKEN secret).
# Run this AFTER the matching GitHub Release exists, so installs can fetch the binary.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match package.json and an existing v<version> release)"
        required: false

permissions:
  contents: read

jobs:
  publish-main:
    name: Publish @mejazbese21/agent-database-cli
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish (launcher only; postinstall downloads the binary)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE="@mejazbese21/agent-database-cli"
          VERSION="$(node -p "require('./package.json').version")"
          if npm publish --access public --ignore-scripts; then
            exit 0
          fi
          if [ "$(npm view "${PACKAGE}@${VERSION}" version 2>/dev/null || true)" = "${VERSION}" ]; then
            echo "${PACKAGE}@${VERSION} already published, skip"
            exit 0
          fi
          exit 1
